<!DOCTYPE html>
<html>
<head>
    <title>Temple Slot Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Temple Slot Booking</h1>
<h2>Available Slots</h2>

<table border="1" cellpadding="10">
<tr>
<th>Time Slot</th>
<th>Status</th>
</tr>

<tr>
<td>06:00 AM - 08:00 AM</td>
<td id="slot1">Available</td>
</tr>

<tr>
<td>08:00 AM - 10:00 AM</td>
<td id="slot2">Available</td>
</tr>

<tr>
<td>10:00 AM - 12:00 PM</td>
<td id="slot3">Available</td>
</tr>

<tr>
<td>04:00 PM - 06:00 PM</td>
<td id="slot4">Available</td>
</tr>

</table>

<br>
<div class="login-box">

<input type="text" id="name"
placeholder="Devotee Name">

<br><br>

<input type="tel" id="mobile"
placeholder="Mobile Number">

<br><br>

<input type="date" id="date">

<br><br>

<select id="time">
    <option>06:00 AM - 08:00 AM</option>
    <option>08:00 AM - 10:00 AM</option>
    <option>10:00 AM - 12:00 PM</option>
    <option>04:00 PM - 06:00 PM</option>
</select>

<br><br>

<input type="number" id="people"
placeholder="Number of Visitors">

<br><br>

<button onclick="bookSlot()">
Book Slot
</button>

<h2 id="result"></h2>

<div id="qrcode"></div>

</div>
<script>
window.onload = updateSlots;
</script>
<script src="script.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
