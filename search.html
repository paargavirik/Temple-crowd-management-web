<!DOCTYPE html>
<html>
<head>
    <title>Search Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Search Booking by Token Number</h1>

<div class="login-box">

<input type="number" id="tokenInput"
placeholder="Enter Token Number">

<br><br>

<button onclick="searchBooking()">
Search
</button>

<br><br>

<div id="result"></div>

<br>

<a href="dashboard.html">
<button>Back to Dashboard</button>
</a>

</div>

<script>

function searchBooking()
{
    let token = parseInt(document.getElementById("tokenInput").value);

    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

    let result = document.getElementById("result");

    result.innerHTML = "";

    for(let i = 0; i < bookings.length; i++)
    {
        if(bookings[i].token == token)
        {
            result.innerHTML =
            "<h2>Booking Found</h2>" +
            "Name : " + bookings[i].name +
            "<br>Mobile : " + bookings[i].mobile +
            "<br>Date : " + bookings[i].date +
            "<br>Time Slot : " + bookings[i].time +
            "<br>Visitors : " + bookings[i].visitors +
            "<br>Crowd Status : " + bookings[i].crowd;

            return;
        }
    }

    result.innerHTML = "<h2>Booking Not Found</h2>";
}

</script>

</body>
</html>
